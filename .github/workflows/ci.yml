name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

  conventions:
    name: Doc / convention checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check:conventions

  workspace-tests:
    name: ${{ matrix.workspace }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@kaluchi/qlang-core"
          - "@kaluchi/qlang-cli"
          - "@kaluchi/qlang-lsp"
          - "@kaluchi/qlang-site"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm test -w ${{ matrix.workspace }}

  coverage:
    name: ${{ matrix.workspace }} coverage thresholds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@kaluchi/qlang-core"
          - "@kaluchi/qlang-cli"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm run test:coverage -w ${{ matrix.workspace }}

  integration:
    name: ${{ matrix.workspace }} integration tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@kaluchi/qlang-cli"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm run test:integration -w ${{ matrix.workspace }}

  # Astro site build — runs the same `astro build` the Pages
  # workflow runs on push to master, but earlier in the PR cycle.
  # This is the only job that exercises Vite's SSR bundler against
  # the qlang-core package; the site-tests job above runs unit
  # tests through vitest, which does not bundle, so a regression
  # in `package.json#sideEffects` / `astro.config.mjs#vite.ssr`
  # would slip past every other matrix entry.
  site-build:
    name: Astro site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm run build -w @kaluchi/qlang-site

  all-green:
    name: All checks passed
    if: always()
    needs: [lint, conventions, workspace-tests, coverage, integration, site-build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.lint.result }}"            == "failure" || \
                "${{ needs.lint.result }}"            == "cancelled" || \
                "${{ needs.conventions.result }}"     == "failure" || \
                "${{ needs.conventions.result }}"     == "cancelled" || \
                "${{ needs.workspace-tests.result }}" == "failure" || \
                "${{ needs.workspace-tests.result }}" == "cancelled" || \
                "${{ needs.coverage.result }}"        == "failure" || \
                "${{ needs.coverage.result }}"        == "cancelled" || \
                "${{ needs.integration.result }}"     == "failure" || \
                "${{ needs.integration.result }}"     == "cancelled" || \
                "${{ needs.site-build.result }}"      == "failure" || \
                "${{ needs.site-build.result }}"      == "cancelled" ]]; then
            exit 1
          fi
