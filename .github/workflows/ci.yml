name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

  workspace-tests:
    name: ${{ matrix.workspace }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@kaluchi/qlang-core"
          - "@kaluchi/qlang-cli"
          - "@kaluchi/qlang-lsp"
          - "@kaluchi/qlang-site"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm test -w ${{ matrix.workspace }}

  coverage:
    name: ${{ matrix.workspace }} coverage thresholds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@kaluchi/qlang-core"
          - "@kaluchi/qlang-cli"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm run test:coverage -w ${{ matrix.workspace }}

  all-green:
    name: All checks passed
    if: always()
    needs: [lint, workspace-tests, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.lint.result }}"            == "failure" || \
                "${{ needs.lint.result }}"            == "cancelled" || \
                "${{ needs.workspace-tests.result }}" == "failure" || \
                "${{ needs.workspace-tests.result }}" == "cancelled" || \
                "${{ needs.coverage.result }}"        == "failure" || \
                "${{ needs.coverage.result }}"        == "cancelled" ]]; then
            exit 1
          fi
