name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish ${{ matrix.workspace }} to npm
    runs-on: ubuntu-latest
    strategy:
      # Core is built first — other workspaces that import from it
      # at test time need the generated artefacts. Serial publish
      # keeps the npm-registry transition visible per package.
      max-parallel: 1
      fail-fast: true
      matrix:
        workspace:
          - "@kaluchi/qlang-core"
          - "@kaluchi/qlang-cli"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm test --workspaces --if-present
      - run: npm run test:coverage -w @kaluchi/qlang-core

      - name: Align version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version -w ${{ matrix.workspace }}

      - name: Publish
        run: npm publish --access public -w ${{ matrix.workspace }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
