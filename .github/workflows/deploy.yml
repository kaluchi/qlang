name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish @kaluchi/qlang-core to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build -w @kaluchi/qlang-core
      - run: npm test --workspaces --if-present
      - run: npm run test:coverage -w @kaluchi/qlang-core

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version -w @kaluchi/qlang-core

      - name: Publish
        run: npm publish --access public -w @kaluchi/qlang-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
